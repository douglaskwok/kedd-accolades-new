<title>Watt — AI Efficiency Leaderboard</title>
<link rel="preconnect" href="https://fonts.googleapis.com">

<link href="https://fonts.googleapis.com/css2?family=Geist:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg-page: oklch(0.12 0.006 70);
    --bg: oklch(0.165 0.008 70);
    --bg-elev: oklch(0.215 0.010 70);
    --bg-elev-2: oklch(0.26 0.012 70);
    --bg-deep: oklch(0.105 0.005 70);
    --line: oklch(0.32 0.010 70);
    --line-soft: oklch(0.26 0.008 70);
    --text: oklch(0.97 0.005 80);
    --text-dim: oklch(0.72 0.008 70);
    --text-faint: oklch(0.50 0.008 70);
    --accent: oklch(0.86 0.17 128);
    --accent-deep: oklch(0.62 0.16 130);
    --gold: oklch(0.83 0.135 88);
    --silver: oklch(0.82 0.010 250);
    --bronze: oklch(0.70 0.115 55);
    --red: oklch(0.70 0.16 25);
    --blue: oklch(0.72 0.13 240);
  }
  html, body {
    margin: 0; padding: 0; height: 100%;
    background: var(--bg-page);
    font-family: 'Geist', -apple-system, system-ui, sans-serif;
    color: var(--text);
    -webkit-font-smoothing: antialiased;
    overflow: hidden;
  }
  #root {
    width: 100vw; height: 100vh;
    display: flex; align-items: center; justify-content: center;
    background:
      radial-gradient(ellipse at 30% 10%, oklch(0.22 0.015 90) 0%, transparent 60%),
      radial-gradient(ellipse at 80% 90%, oklch(0.18 0.012 140) 0%, transparent 55%),
      var(--bg-page);
  }
  ::-webkit-scrollbar { width: 0; height: 0; }
  .mono { font-family: 'JetBrains Mono', ui-monospace, monospace; }
  button { font-family: inherit; }
</style>
</head>
