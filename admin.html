<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Watt — Admin</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg-page: oklch(0.12 0.006 70);
    --bg: oklch(0.165 0.008 70);
    --bg-elev: oklch(0.215 0.010 70);
    --line: oklch(0.32 0.010 70);
    --text: oklch(0.97 0.005 80);
    --text-dim: oklch(0.72 0.008 70);
    --text-faint: oklch(0.50 0.008 70);
    --accent: oklch(0.86 0.17 128);
    --red: oklch(0.70 0.16 25);
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg-page);
    color: var(--text);
    font-family: 'Geist', system-ui, sans-serif;
    min-height: 100vh;
    display: flex;
    align-items: flex-start;
    justify-content: center;
    padding: 48px 16px;
    -webkit-font-smoothing: antialiased;
  }
  .card {
    background: var(--bg);
    border: 1px solid var(--line);
    border-radius: 16px;
    padding: 32px;
    width: 100%;
    max-width: 780px;
    display: flex;
    flex-direction: column;
    gap: 20px;
  }
  h1 { font-size: 18px; font-weight: 600; letter-spacing: -0.3px; }
  label { font-size: 13px; color: var(--text-dim); margin-bottom: 6px; display: block; }
  .row { display: flex; gap: 10px; }
  input[type="password"] {
    flex: 1;
    background: var(--bg-elev);
    border: 1px solid var(--line);
    border-radius: 8px;
    color: var(--text);
    font-family: 'JetBrains Mono', monospace;
    font-size: 14px;
    padding: 10px 14px;
    outline: none;
    transition: border-color 0.15s;
  }
  input[type="password"]:focus { border-color: var(--accent); }
  textarea {
    width: 100%;
    height: 480px;
    background: var(--bg-elev);
    border: 1px solid var(--line);
    border-radius: 8px;
    color: var(--text);
    font-family: 'JetBrains Mono', monospace;
    font-size: 12.5px;
    line-height: 1.6;
    padding: 14px;
    resize: vertical;
    outline: none;
    transition: border-color 0.15s;
  }
  textarea:focus { border-color: var(--accent); }
  textarea.error { border-color: var(--red); }
  button {
    font-family: 'Geist', system-ui, sans-serif;
    font-size: 14px;
    font-weight: 500;
    border: none;
    border-radius: 8px;
    padding: 10px 18px;
    cursor: pointer;
    transition: opacity 0.15s;
  }
  button:disabled { opacity: 0.4; cursor: default; }
  .btn-primary { background: var(--accent); color: oklch(0.12 0.006 70); }
  .btn-secondary { background: var(--bg-elev); color: var(--text); border: 1px solid var(--line); }
  .btn-primary:not(:disabled):hover { opacity: 0.85; }
  .btn-secondary:not(:disabled):hover { opacity: 0.75; }
  .status {
    font-size: 13px;
    padding: 10px 14px;
    border-radius: 8px;
    display: none;
  }
  .status.ok  { background: oklch(0.20 0.04 128); color: var(--accent); display: block; }
  .status.err { background: oklch(0.18 0.04 25);  color: var(--red);    display: block; }
  .divider { border: none; border-top: 1px solid var(--line); }
  .actions { display: flex; gap: 10px; align-items: center; }
  .spacer { flex: 1; }
</style>
</head>
<body>
<div class="card">
  <h1>Watt — Data Editor</h1>

  <div>
    <label for="secret">Update secret</label>
    <div class="row">
      <input type="password" id="secret" placeholder="Paste your UPDATE_SECRET…" />
      <button class="btn-secondary" id="loadBtn">Load data</button>
    </div>
  </div>

  <hr class="divider" />

  <div>
    <label for="editor">data.json</label>
    <textarea id="editor" spellcheck="false" placeholder="Click Load data to fetch the current data…"></textarea>
  </div>

  <div class="status" id="status"></div>

  <div class="actions">
    <button class="btn-secondary" id="formatBtn">Format JSON</button>
    <div class="spacer"></div>
    <button class="btn-primary" id="saveBtn" disabled>Save</button>
  </div>
</div>

<script>
const secretEl = document.getElementById('secret');
const editorEl = document.getElementById('editor');
const statusEl = document.getElementById('status');
const loadBtn  = document.getElementById('loadBtn');
const saveBtn  = document.getElementById('saveBtn');
const formatBtn = document.getElementById('formatBtn');

function showStatus(msg, type) {
  statusEl.textContent = msg;
  statusEl.className = `status ${type}`;
}

function clearStatus() {
  statusEl.className = 'status';
}

function validateJSON() {
  try {
    JSON.parse(editorEl.value);
    editorEl.classList.remove('error');
    return true;
  } catch {
    editorEl.classList.add('error');
    return false;
  }
}

editorEl.addEventListener('input', () => {
  clearStatus();
  const ok = validateJSON();
  saveBtn.disabled = !ok || !editorEl.value.trim();
});

formatBtn.addEventListener('click', () => {
  try {
    const parsed = JSON.parse(editorEl.value);
    editorEl.value = JSON.stringify(parsed, null, 2);
    editorEl.classList.remove('error');
    clearStatus();
  } catch {
    showStatus('Invalid JSON — fix errors before formatting.', 'err');
  }
});

loadBtn.addEventListener('click', async () => {
  clearStatus();
  loadBtn.disabled = true;
  loadBtn.textContent = 'Loading…';
  try {
    const res = await fetch('/api/data');
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const json = await res.json();
    editorEl.value = JSON.stringify(json, null, 2);
    editorEl.classList.remove('error');
    saveBtn.disabled = false;
    showStatus('Data loaded.', 'ok');
  } catch (e) {
    showStatus(`Failed to load: ${e.message}`, 'err');
  } finally {
    loadBtn.disabled = false;
    loadBtn.textContent = 'Load data';
  }
});

saveBtn.addEventListener('click', async () => {
  if (!validateJSON()) return showStatus('Fix JSON errors before saving.', 'err');
  const secret = secretEl.value.trim();
  if (!secret) return showStatus('Enter your update secret first.', 'err');

  saveBtn.disabled = true;
  saveBtn.textContent = 'Saving…';
  try {
    const res = await fetch('/api/update', {
      method: 'POST',
      headers: {
        'Authorization': `Bearer ${secret}`,
        'Content-Type': 'application/json',
      },
      body: editorEl.value,
    });
    const json = await res.json();
    if (!res.ok) throw new Error(json.error ?? res.status);
    showStatus('Saved. Changes are live within a few seconds.', 'ok');
  } catch (e) {
    showStatus(`Save failed: ${e.message}`, 'err');
  } finally {
    saveBtn.disabled = false;
    saveBtn.textContent = 'Save';
  }
});
</script>
</body>
</html>
